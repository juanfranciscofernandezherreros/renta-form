openapi: 3.0.3

info:
  title: Renta Form API
  description: |
    API para la gestión de cuestionarios de la Campaña de la Renta 2025 (IRPF).

    Permite:
    - Consultar el catálogo de preguntas estructuradas por secciones.
    - Enviar un cuestionario completo con documentación adjunta.
  version: 1.0.0
  contact:
    name: Soporte Renta Form
    url: https://www.agenciatributaria.es

servers:
  - url: https://api.renta-form.example/v1
    description: Servidor de producción
  - url: http://localhost:3001/v1
    description: Servidor de desarrollo local

tags:
  - name: Preguntas
    description: Catálogo de preguntas del cuestionario
  - name: PreguntasAdmin
    description: Gestión CRUD de preguntas adicionales (admin)
  - name: SeccionesAdmin
    description: Gestión CRUD de secciones (admin)
  - name: Declaraciones
    description: Gestión de cuestionarios enviados

paths:
  /irpf/preguntas:
    get:
      operationId: getPreguntas
      tags: [Preguntas]
      summary: Obtiene el catálogo de preguntas
      description: |
        Devuelve todas las secciones del cuestionario con sus preguntas
        ordenadas, incluyendo condiciones de visibilidad condicional.
      responses:
        '200':
          description: Catálogo de preguntas obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogoPreguntas'
              example:
                secciones:
                  - id: seccion-vivienda
                    numero: 2
                    titulo: Situación de Vivienda
                    preguntas:
                      - id: viviendaAlquiler
                        texto: '¿Vive de alquiler?'
                        indentada: false
                      - id: alquilerMenos35
                        texto: '¿El alquiler es inferior a 35 años?'
                        indentada: true
                        condicion:
                          campo: viviendaAlquiler
                          valor: si
        '503':
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones:
    post:
      operationId: createDeclaracion
      tags: [Declaraciones]
      summary: Envía un cuestionario fiscal completo
      description: |
        Recibe el cuestionario IRPF relleno junto con la documentación
        adjunta en formato `multipart/form-data`. Crea una nueva declaración
        en estado `recibido`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeclaracionInput'
      responses:
        '201':
          description: Declaración creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeclaracionCreada'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidacion'
        '422':
          description: Entidad no procesable (restricciones de negocio)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      operationId: listDeclaraciones
      tags: [Declaraciones]
      summary: Lista las declaraciones registradas
      description: Devuelve una lista paginada de declaraciones (uso interno/administración).
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: estado
          in: query
          description: Filtra por estado del expediente
          schema:
            $ref: '#/components/schemas/EstadoExpediente'
        - name: dniNie
          in: query
          description: Filtra por DNI/NIE del contribuyente
          schema:
            type: string
            pattern: '^[0-9XYZ][0-9]{7}[A-Z]$'
      responses:
        '200':
          description: Lista de declaraciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDeclaraciones'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones/{id}:
    get:
      operationId: getDeclaracion
      tags: [Declaraciones]
      summary: Obtiene el detalle de una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Detalle de la declaración
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Declaracion'
        '404':
          description: Declaración no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      operationId: updateEstadoDeclaracion
      tags: [Declaraciones]
      summary: Actualiza el estado de una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado:
                  $ref: '#/components/schemas/EstadoExpediente'
      responses:
        '200':
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Declaracion'
        '404':
          description: Declaración no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/preguntas:
    get:
      operationId: listPreguntasAdmin
      tags: [PreguntasAdmin]
      summary: Lista todas las preguntas adicionales
      parameters:
        - name: activa
          in: query
          schema:
            type: boolean
          description: Filtra por estado activa/inactiva
      responses:
        '200':
          description: Lista de preguntas adicionales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaPreguntasAdicionales'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createPreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Crea una nueva pregunta adicional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreguntaAdicionalInput'
      responses:
        '201':
          description: Pregunta creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreguntaAdicional'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/preguntas/{preguntaId}:
    get:
      operationId: getPreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Obtiene una pregunta adicional por ID
      parameters:
        - $ref: '#/components/parameters/PreguntaIdParam'
      responses:
        '200':
          description: Detalle de la pregunta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreguntaAdicional'
        '404':
          description: Pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: updatePreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Actualiza una pregunta adicional
      parameters:
        - $ref: '#/components/parameters/PreguntaIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreguntaAdicionalInput'
      responses:
        '200':
          description: Pregunta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreguntaAdicional'
        '404':
          description: Pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deletePreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Elimina una pregunta adicional
      parameters:
        - $ref: '#/components/parameters/PreguntaIdParam'
      responses:
        '204':
          description: Pregunta eliminada correctamente
        '404':
          description: Pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones/{id}/preguntas:
    get:
      operationId: getDeclaracionPreguntas
      tags: [Declaraciones]
      summary: Obtiene las preguntas asignadas a una declaración con sus respuestas
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Preguntas y respuestas de la declaración
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDeclaracionPreguntas'
        '404':
          description: Declaración no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: upsertDeclaracionPreguntas
      tags: [Declaraciones]
      summary: Asigna o actualiza preguntas y respuestas en una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertDeclaracionPreguntasInput'
      responses:
        '200':
          description: Preguntas y respuestas actualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDeclaracionPreguntas'
        '404':
          description: Declaración o pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones/{id}/preguntas/{preguntaId}:
    delete:
      operationId: removeDeclaracionPregunta
      tags: [Declaraciones]
      summary: Desasigna una pregunta de una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PreguntaIdParam'
      responses:
        '204':
          description: Pregunta desasignada correctamente
        '404':
          description: Asignación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/secciones:
    get:
      operationId: listSeccionesAdmin
      tags: [SeccionesAdmin]
      summary: Lista todas las secciones
      parameters:
        - name: activa
          in: query
          schema:
            type: boolean
          description: Filtra por estado activa/inactiva
      responses:
        '200':
          description: Lista de secciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaSecciones'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createSeccionAdmin
      tags: [SeccionesAdmin]
      summary: Crea una nueva sección
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeccionInput'
      responses:
        '201':
          description: Sección creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seccion'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ya existe una sección con ese nombre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/secciones/{seccionId}:
    put:
      operationId: updateSeccionAdmin
      tags: [SeccionesAdmin]
      summary: Actualiza una sección
      parameters:
        - $ref: '#/components/parameters/SeccionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeccionInput'
      responses:
        '200':
          description: Sección actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seccion'
        '404':
          description: Sección no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteSeccionAdmin
      tags: [SeccionesAdmin]
      summary: Elimina una sección
      parameters:
        - $ref: '#/components/parameters/SeccionIdParam'
      responses:
        '204':
          description: Sección eliminada correctamente
        '404':
          description: Sección no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: La sección tiene preguntas asignadas y no puede eliminarse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


    IdParam:
      name: id
      in: path
      required: true
      description: UUID de la declaración
      schema:
        type: string
        format: uuid
    PreguntaIdParam:
      name: preguntaId
      in: path
      required: true
      description: UUID de la pregunta adicional
      schema:
        type: string
        format: uuid
    SeccionIdParam:
      name: seccionId
      in: path
      required: true
      description: UUID de la sección
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:

    # ------------------------------------------------------------------
    # Enumerados
    # ------------------------------------------------------------------
    RespuestaYN:
      type: string
      enum: [si, no]
      description: Respuesta de tipo Sí/No

    EstadoExpediente:
      type: string
      enum:
        - recibido
        - en_revision
        - documentacion_pendiente
        - completado
        - archivado

    TipoDocumento:
      type: string
      enum:
        - dni_anverso
        - dni_reverso
        - adicional

    # ------------------------------------------------------------------
    # Catálogo de Preguntas
    # ------------------------------------------------------------------
    CondicionVisibilidad:
      type: object
      required: [campo, valor]
      description: La pregunta sólo se muestra si el campo indicado tiene el valor especificado
      properties:
        campo:
          type: string
          description: Nombre del campo del formulario que actúa como condición
          example: viviendaAlquiler
        valor:
          type: string
          description: Valor que debe tener el campo para mostrar esta pregunta
          example: si

    Pregunta:
      type: object
      required: [id, texto, indentada]
      properties:
        id:
          type: string
          description: Identificador único (coincide con el nombre del campo en el formulario)
          example: alquilerMenos35
        texto:
          type: string
          description: Texto de la pregunta que se muestra al usuario
          example: '¿El importe del alquiler es inferior al 35 % de los ingresos?'
        indentada:
          type: boolean
          description: Si es true, la pregunta se muestra con sangría (es subpregunta de otra)
          default: false
        condicion:
          $ref: '#/components/schemas/CondicionVisibilidad'

    Seccion:
      type: object
      required: [id, numero, titulo, preguntas]
      properties:
        id:
          type: string
          example: seccion-vivienda
        numero:
          type: integer
          minimum: 1
          example: 2
        titulo:
          type: string
          example: Situación de Vivienda
        preguntas:
          type: array
          items:
            $ref: '#/components/schemas/Pregunta'

    CatalogoPreguntas:
      type: object
      required: [secciones]
      properties:
        secciones:
          type: array
          items:
            $ref: '#/components/schemas/Seccion'

    # ------------------------------------------------------------------
    # Declaración – Input (multipart/form-data)
    # ------------------------------------------------------------------
    DeclaracionInput:
      type: object
      required:
        - nombre
        - apellidos
        - dniNie
        - email
        - telefono
        - viviendaAlquiler
        - viviendaPropiedad
        - pisosAlquiladosTerceros
        - segundaResidencia
        - familiaNumerosa
        - ayudasGobierno
        - mayores65ACargo
        - hijosMenores26
        - ingresosJuego
        - ingresosInversiones
      properties:
        # 1. Identificación
        nombre:
          type: string
          maxLength: 100
          example: María
        apellidos:
          type: string
          maxLength: 200
          example: García López
        dniNie:
          type: string
          pattern: '^[0-9XYZ][0-9]{7}[A-Z]$'
          example: 12345678A
        email:
          type: string
          format: email
          example: maria.garcia@ejemplo.es
        telefono:
          type: string
          maxLength: 20
          example: '600123456'
        # 2. Vivienda
        viviendaAlquiler:
          $ref: '#/components/schemas/RespuestaYN'
        alquilerMenos35:
          $ref: '#/components/schemas/RespuestaYN'
          description: Obligatorio cuando viviendaAlquiler = si
        viviendaPropiedad:
          $ref: '#/components/schemas/RespuestaYN'
        propiedadAntes2013:
          $ref: '#/components/schemas/RespuestaYN'
          description: Obligatorio cuando viviendaPropiedad = si
        pisosAlquiladosTerceros:
          $ref: '#/components/schemas/RespuestaYN'
        segundaResidencia:
          $ref: '#/components/schemas/RespuestaYN'
        # 3. Familia
        familiaNumerosa:
          $ref: '#/components/schemas/RespuestaYN'
        ayudasGobierno:
          $ref: '#/components/schemas/RespuestaYN'
        mayores65ACargo:
          $ref: '#/components/schemas/RespuestaYN'
        mayoresConviven:
          $ref: '#/components/schemas/RespuestaYN'
          description: Obligatorio cuando mayores65ACargo = si
        hijosMenores26:
          $ref: '#/components/schemas/RespuestaYN'
        # 4. Ingresos
        ingresosJuego:
          $ref: '#/components/schemas/RespuestaYN'
        ingresosInversiones:
          $ref: '#/components/schemas/RespuestaYN'
        # 5. Documentación
        docDniAnverso:
          type: string
          format: binary
          description: Anverso del DNI/NIE (PDF, JPG, PNG; máx. 5 MB)
        docDniReverso:
          type: string
          format: binary
          description: Reverso del DNI/NIE (PDF, JPG, PNG; máx. 5 MB)
        docAdicional:
          type: array
          items:
            type: string
            format: binary
          description: Documentación adicional (nóminas, certificados, etc.)
        # 6. Información adicional
        comentarios:
          type: string
          description: Situaciones especiales a tener en cuenta

    # ------------------------------------------------------------------
    # Declaración – Output
    # ------------------------------------------------------------------
    DeclaracionCreada:
      type: object
      required: [id, estado, creadoEn]
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        estado:
          $ref: '#/components/schemas/EstadoExpediente'
        creadoEn:
          type: string
          format: date-time

    Documento:
      type: object
      required: [id, tipo, nombreOriginal, mimeType, tamanyo, subidoEn]
      properties:
        id:
          type: string
          format: uuid
        tipo:
          $ref: '#/components/schemas/TipoDocumento'
        nombreOriginal:
          type: string
        mimeType:
          type: string
        tamanyo:
          type: integer
          description: Tamaño en bytes
        url:
          type: string
          description: URL de acceso al documento (si se almacena externamente)
        subidoEn:
          type: string
          format: date-time

    Declaracion:
      allOf:
        - $ref: '#/components/schemas/DeclaracionCreada'
        - type: object
          required:
            - nombre
            - apellidos
            - dniNie
            - email
            - telefono
            - viviendaAlquiler
            - viviendaPropiedad
            - pisosAlquiladosTerceros
            - segundaResidencia
            - familiaNumerosa
            - ayudasGobierno
            - mayores65ACargo
            - hijosMenores26
            - ingresosJuego
            - ingresosInversiones
            - actualizadoEn
            - documentos
          properties:
            nombre:
              type: string
            apellidos:
              type: string
            dniNie:
              type: string
            email:
              type: string
              format: email
            telefono:
              type: string
            viviendaAlquiler:
              $ref: '#/components/schemas/RespuestaYN'
            alquilerMenos35:
              $ref: '#/components/schemas/RespuestaYN'
            viviendaPropiedad:
              $ref: '#/components/schemas/RespuestaYN'
            propiedadAntes2013:
              $ref: '#/components/schemas/RespuestaYN'
            pisosAlquiladosTerceros:
              $ref: '#/components/schemas/RespuestaYN'
            segundaResidencia:
              $ref: '#/components/schemas/RespuestaYN'
            familiaNumerosa:
              $ref: '#/components/schemas/RespuestaYN'
            ayudasGobierno:
              $ref: '#/components/schemas/RespuestaYN'
            mayores65ACargo:
              $ref: '#/components/schemas/RespuestaYN'
            mayoresConviven:
              $ref: '#/components/schemas/RespuestaYN'
            hijosMenores26:
              $ref: '#/components/schemas/RespuestaYN'
            ingresosJuego:
              $ref: '#/components/schemas/RespuestaYN'
            ingresosInversiones:
              $ref: '#/components/schemas/RespuestaYN'
            comentarios:
              type: string
            actualizadoEn:
              type: string
              format: date-time
            documentos:
              type: array
              items:
                $ref: '#/components/schemas/Documento'

    ListaDeclaraciones:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Declaracion'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ------------------------------------------------------------------
    # Errores
    # ------------------------------------------------------------------
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: SERVICE_UNAVAILABLE
        message:
          type: string
          example: El servicio no está disponible en este momento

    ErrorValidacion:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errores:
              type: array
              items:
                type: object
                required: [campo, mensaje]
                properties:
                  campo:
                    type: string
                    example: dniNie
                  mensaje:
                    type: string
                    example: El formato del DNI/NIE no es válido

    # ------------------------------------------------------------------
    # Preguntas adicionales (CRUD admin)
    # ------------------------------------------------------------------
    TipoRespuesta:
      type: string
      enum: [yn, texto, numero]
      description: Tipo de respuesta esperada para la pregunta

    PreguntaAdicionalInput:
      type: object
      required: [texto, seccion, tipoRespuesta]
      properties:
        texto:
          type: string
          description: Texto de la pregunta
          example: '¿Ha declarado bienes en el extranjero (modelo 720)?'
        seccion:
          type: string
          description: Sección a la que pertenece la pregunta
          example: Ingresos Extraordinarios
        tipoRespuesta:
          $ref: '#/components/schemas/TipoRespuesta'
        orden:
          type: integer
          minimum: 0
          default: 0
        activa:
          type: boolean
          default: true

    PreguntaAdicional:
      allOf:
        - $ref: '#/components/schemas/PreguntaAdicionalInput'
        - type: object
          required: [id, creadaEn, actualizadaEn]
          properties:
            id:
              type: string
              format: uuid
            creadaEn:
              type: string
              format: date-time
            actualizadaEn:
              type: string
              format: date-time

    ListaPreguntasAdicionales:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PreguntaAdicional'
        total:
          type: integer

    # ------------------------------------------------------------------
    # Asignación declaración ↔ pregunta (many-to-many)
    # ------------------------------------------------------------------
    DeclaracionPregunta:
      type: object
      required: [id, declaracionId, preguntaId, asignadaEn]
      properties:
        id:
          type: string
          format: uuid
        declaracionId:
          type: string
          format: uuid
        preguntaId:
          type: string
          format: uuid
        pregunta:
          $ref: '#/components/schemas/PreguntaAdicional'
        respuesta:
          type: string
          nullable: true
        asignadaEn:
          type: string
          format: date-time
        respondidaEn:
          type: string
          format: date-time
          nullable: true

    ListaDeclaracionPreguntas:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeclaracionPregunta'
        total:
          type: integer

    UpsertDeclaracionPreguntasInput:
      type: object
      required: [asignaciones]
      properties:
        asignaciones:
          type: array
          items:
            type: object
            required: [preguntaId]
            properties:
              preguntaId:
                type: string
                format: uuid
              respuesta:
                type: string
                nullable: true

    # ------------------------------------------------------------------
    # Secciones (CRUD admin)
    # ------------------------------------------------------------------
    SeccionInput:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          description: Nombre de la sección
          example: Ingresos Extraordinarios e Inversiones
        orden:
          type: integer
          minimum: 1
          default: 1
        activa:
          type: boolean
          default: true

    Seccion:
      allOf:
        - $ref: '#/components/schemas/SeccionInput'
        - type: object
          required: [id, creadaEn, actualizadaEn]
          properties:
            id:
              type: string
              format: uuid
            creadaEn:
              type: string
              format: date-time
            actualizadaEn:
              type: string
              format: date-time

    ListaSecciones:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Seccion'
        total:
          type: integer
