name: Generate SQL from translations

on:
  push:
    branches:
      - master
    paths:
      - 'translations/**'

jobs:
  generate-sql:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SQL from translation files
        run: node scripts/sync-translations-to-sql.js

      - name: Commit updated SQL file
        run: |
          CHANGED=$(git status --porcelain -- 'database/init.sql' 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "No changes in database/init.sql. Nothing to commit."
            exit 0
          fi

          echo "Changes detected in database/init.sql:"
          echo "$CHANGED"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add database/init.sql
          git commit -m "chore(i18n): auto-sync translations to SQL [skip ci]"
          git push origin master

          echo "✅ database/init.sql committed and pushed to master."
