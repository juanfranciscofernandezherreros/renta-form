openapi: 3.0.3

info:
  title: Renta Form API
  description: |
    API para la gestión de cuestionarios de la Campaña de la Renta 2025 (IRPF).

    Permite:
    - Consultar el catálogo de preguntas estructuradas por secciones.
    - Enviar un cuestionario completo con documentación adjunta.
  version: 1.0.0
  contact:
    name: Soporte Renta Form
    url: https://www.agenciatributaria.es

servers:
  - url: https://api.renta-form.example/v1
    description: Servidor de producción
  - url: http://localhost:3001/v1
    description: Servidor de desarrollo local

tags:
  - name: Preguntas
    description: Catálogo de preguntas del cuestionario
  - name: PreguntasAdmin
    description: Gestión CRUD de preguntas adicionales (admin)
  - name: SeccionesAdmin
    description: Gestión CRUD de secciones (admin)
  - name: IdiomasAdmin
    description: Gestión CRUD de idiomas y traducciones i18n (admin)
  - name: Declaraciones
    description: Gestión de cuestionarios enviados

paths:
  /irpf/preguntas:
    get:
      operationId: getPreguntas
      tags: [Preguntas]
      summary: Obtiene el catálogo de preguntas
      description: |
        Devuelve todas las secciones del cuestionario con sus preguntas.
      responses:
        '200':
          description: Catálogo de preguntas obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogoPreguntas'
              example:
                secciones:
                  - id: seccion-vivienda
                    numero: 1
                    titulo: Situación de Vivienda
                    titulos:
                      es: Situación de Vivienda
                      fr: Situation de logement
                      ca: Situació d'habitatge
                      en: Housing Situation
                    preguntas:
                      - id: viviendaAlquiler
                        texto: '¿Vive de alquiler?'
                        textos:
                          es: '¿Vive de alquiler?'
                          fr: 'Vivez-vous en location ?'
                          ca: 'Viu de lloguer?'
                          en: 'Do you live in a rental?'
                      - id: alquilerMenos35
                        texto: '¿El importe del alquiler es inferior al 35 % de los ingresos?'
                        textos:
                          es: '¿El importe del alquiler es inferior al 35 % de los ingresos?'
                          en: 'Is the rent amount less than 35% of your income?'
        '503':
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/idiomas:
    get:
      operationId: getIdiomas
      tags: [Preguntas]
      summary: Obtiene los idiomas activos
      description: |
        Devuelve la lista de idiomas activos disponibles para la interfaz.
      responses:
        '200':
          description: Lista de idiomas activos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: es
                    label:
                      type: string
                      example: Español

  /irpf/traducciones:
    get:
      operationId: getTraducciones
      tags: [Preguntas]
      summary: Obtiene todas las traducciones activas
      description: |
        Devuelve un mapa con las traducciones de cada idioma activo,
        agrupadas por código de idioma.
      responses:
        '200':
          description: Traducciones obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    type: string
              example:
                es:
                  headerTitle: 'Cuestionario para Expediente Fiscal'
                en:
                  headerTitle: 'Tax Filing Questionnaire'

  /irpf/declaraciones:
    post:
      operationId: createDeclaracion
      tags: [Declaraciones]
      summary: Envía un cuestionario fiscal completo
      description: |
        Recibe el cuestionario IRPF relleno junto con la documentación
        adjunta en formato `multipart/form-data`. Crea una nueva declaración
        en estado `recibido`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeclaracionInput'
      responses:
        '201':
          description: Declaración creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeclaracionCreada'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidacion'
        '422':
          description: Entidad no procesable (restricciones de negocio)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      operationId: listDeclaraciones
      tags: [Declaraciones]
      summary: Lista las declaraciones registradas
      description: Devuelve una lista paginada de declaraciones (uso interno/administración).
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: estado
          in: query
          description: Filtra por estado del expediente
          schema:
            $ref: '#/components/schemas/EstadoExpediente'
        - name: dniNie
          in: query
          description: Filtra por DNI/NIE del contribuyente
          schema:
            type: string
            pattern: '^[0-9XYZ][0-9]{7}[A-Z]$'
      responses:
        '200':
          description: Lista de declaraciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDeclaraciones'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones/{id}:
    get:
      operationId: getDeclaracion
      tags: [Declaraciones]
      summary: Obtiene el detalle de una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Detalle de la declaración
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Declaracion'
        '404':
          description: Declaración no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      operationId: updateEstadoDeclaracion
      tags: [Declaraciones]
      summary: Actualiza el estado de una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado:
                  $ref: '#/components/schemas/EstadoExpediente'
      responses:
        '200':
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Declaracion'
        '404':
          description: Declaración no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/preguntas:
    get:
      operationId: listPreguntasAdmin
      tags: [PreguntasAdmin]
      summary: Lista todas las preguntas adicionales
      parameters:
        - name: activa
          in: query
          schema:
            type: boolean
          description: Filtra por estado activa/inactiva
      responses:
        '200':
          description: Lista de preguntas adicionales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaPreguntasAdicionales'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createPreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Crea una nueva pregunta adicional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreguntaAdicionalInput'
      responses:
        '201':
          description: Pregunta creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreguntaAdicional'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/preguntas/{preguntaId}:
    get:
      operationId: getPreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Obtiene una pregunta adicional por ID
      parameters:
        - $ref: '#/components/parameters/PreguntaIdParam'
      responses:
        '200':
          description: Detalle de la pregunta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreguntaAdicional'
        '404':
          description: Pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: updatePreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Actualiza una pregunta adicional
      parameters:
        - $ref: '#/components/parameters/PreguntaIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreguntaAdicionalInput'
      responses:
        '200':
          description: Pregunta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreguntaAdicional'
        '404':
          description: Pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deletePreguntaAdmin
      tags: [PreguntasAdmin]
      summary: Elimina una pregunta adicional
      parameters:
        - $ref: '#/components/parameters/PreguntaIdParam'
      responses:
        '204':
          description: Pregunta eliminada correctamente
        '404':
          description: Pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones/{id}/preguntas:
    get:
      operationId: getDeclaracionPreguntas
      tags: [Declaraciones]
      summary: Obtiene las preguntas asignadas a una declaración con sus respuestas
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Preguntas y respuestas de la declaración
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDeclaracionPreguntas'
        '404':
          description: Declaración no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: upsertDeclaracionPreguntas
      tags: [Declaraciones]
      summary: Asigna o actualiza preguntas y respuestas en una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertDeclaracionPreguntasInput'
      responses:
        '200':
          description: Preguntas y respuestas actualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDeclaracionPreguntas'
        '404':
          description: Declaración o pregunta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /irpf/declaraciones/{id}/preguntas/{preguntaId}:
    delete:
      operationId: removeDeclaracionPregunta
      tags: [Declaraciones]
      summary: Desasigna una pregunta de una declaración
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PreguntaIdParam'
      responses:
        '204':
          description: Pregunta desasignada correctamente
        '404':
          description: Asignación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/secciones:
    get:
      operationId: listSeccionesAdmin
      tags: [SeccionesAdmin]
      summary: Lista todas las secciones
      parameters:
        - name: activa
          in: query
          schema:
            type: boolean
          description: Filtra por estado activa/inactiva
      responses:
        '200':
          description: Lista de secciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaSecciones'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createSeccionAdmin
      tags: [SeccionesAdmin]
      summary: Crea una nueva sección
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeccionInput'
      responses:
        '201':
          description: Sección creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeccionAdmin'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ya existe una sección con ese nombre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/secciones/{seccionId}:
    put:
      operationId: updateSeccionAdmin
      tags: [SeccionesAdmin]
      summary: Actualiza una sección
      parameters:
        - $ref: '#/components/parameters/SeccionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeccionInput'
      responses:
        '200':
          description: Sección actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeccionAdmin'
        '404':
          description: Sección no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteSeccionAdmin
      tags: [SeccionesAdmin]
      summary: Elimina una sección
      parameters:
        - $ref: '#/components/parameters/SeccionIdParam'
      responses:
        '204':
          description: Sección eliminada correctamente
        '404':
          description: Sección no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: La sección tiene preguntas asignadas y no puede eliminarse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Admin: Idiomas & Traducciones ──────────────────────────────────────────

  /admin/idiomas:
    get:
      operationId: listIdiomasAdmin
      tags: [IdiomasAdmin]
      summary: Lista los idiomas disponibles
      parameters:
        - name: activo
          in: query
          schema:
            type: boolean
          description: Filtra por estado activo/inactivo
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Lista paginada de idiomas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaIdiomas'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createIdiomaAdmin
      tags: [IdiomasAdmin]
      summary: Crea un nuevo idioma
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdiomaInput'
      responses:
        '201':
          description: Idioma creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Idioma'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ya existe un idioma con ese código
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/idiomas/{idiomaId}:
    put:
      operationId: updateIdiomaAdmin
      tags: [IdiomasAdmin]
      summary: Actualiza un idioma
      parameters:
        - $ref: '#/components/parameters/IdiomaIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdiomaUpdateInput'
      responses:
        '200':
          description: Idioma actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Idioma'
        '404':
          description: Idioma no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteIdiomaAdmin
      tags: [IdiomasAdmin]
      summary: Elimina un idioma
      parameters:
        - $ref: '#/components/parameters/IdiomaIdParam'
      responses:
        '204':
          description: Idioma eliminado correctamente
        '400':
          description: No se puede eliminar el idioma por defecto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Idioma no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/idiomas/{idiomaId}/content:
    get:
      operationId: getIdiomaContent
      tags: [IdiomasAdmin]
      summary: Obtiene las traducciones de un idioma
      parameters:
        - $ref: '#/components/parameters/IdiomaIdParam'
      responses:
        '200':
          description: Contenido de traducciones del idioma
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdiomaContent'
        '404':
          description: Idioma no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: updateIdiomaContent
      tags: [IdiomasAdmin]
      summary: Actualiza las traducciones de un idioma
      description: |
        Reemplaza o añade claves de traducción para el idioma indicado.
        Las claves existentes no presentes en el cuerpo no se eliminan.
      parameters:
        - $ref: '#/components/parameters/IdiomaIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdiomaContentInput'
      responses:
        '200':
          description: Traducciones guardadas correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdiomaContent'
        '404':
          description: Idioma no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/traducciones/faltantes:
    get:
      operationId: getMissingTranslations
      tags: [IdiomasAdmin]
      summary: Traducciones faltantes por idioma
      description: |
        Compara las claves de cada idioma activo con el conjunto canónico de claves
        extraído del código fuente del frontend (`ALL_REQUIRED_KEYS`) y devuelve
        qué claves faltan en cada idioma.

        Cuando se omite `ref` o se pasa `ref=static` (por defecto), el conjunto de
        referencia son las claves estáticas del proyecto — **no hace falta tener
        ningún idioma base** en la base de datos.

        Si se indica un código de idioma concreto (p.ej. `ref=es`), ese idioma se
        usa como referencia adicional: sus claves en BD se combinan con las estáticas
        para formar el conjunto de referencia.  Si el idioma indicado no existe,
        el endpoint vuelve automáticamente al modo estático.
      parameters:
        - name: ref
          in: query
          required: false
          description: |
            Código del idioma de referencia o `static` (valor por defecto).
            Usa `static` para comparar contra las claves del código fuente del
            frontend sin depender de ningún idioma base en la BD.
          schema:
            type: string
            default: static
      responses:
        '200':
          description: Resumen de traducciones faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraduccionesFaltantes'
        '404':
          description: El idioma de referencia no existe o no está activo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: UUID de la declaración
      schema:
        type: string
        format: uuid
    PreguntaIdParam:
      name: preguntaId
      in: path
      required: true
      description: UUID de la pregunta adicional
      schema:
        type: string
        format: uuid
    SeccionIdParam:
      name: seccionId
      in: path
      required: true
      description: UUID de la sección
      schema:
        type: string
        format: uuid
    IdiomaIdParam:
      name: idiomaId
      in: path
      required: true
      description: UUID del idioma
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:

    # ------------------------------------------------------------------
    # Enumerados
    # ------------------------------------------------------------------
    RespuestaYN:
      type: string
      enum: [si, no]
      description: Respuesta de tipo Sí/No

    EstadoExpediente:
      type: string
      enum:
        - recibido
        - en_revision
        - documentacion_pendiente
        - completado
        - archivado

    TipoDocumento:
      type: string
      enum:
        - dni_anverso
        - dni_reverso
        - adicional

    # ------------------------------------------------------------------
    # Catálogo de Preguntas
    # ------------------------------------------------------------------
    Pregunta:
      type: object
      required: [id, texto]
      properties:
        id:
          type: string
          description: Identificador público de la pregunta. Coincide con `campo` (camelCase).
          example: alquilerMenos35
        campo:
          type: string
          description: Identificador estable camelCase. Único en `preguntas`.
          example: alquilerMenos35
        orden:
          type: integer
          description: Posición de aparición en el wizard (ascendente).
          example: 2
        texto:
          type: string
          description: Texto de la pregunta en español
          example: '¿El importe del alquiler es inferior al 35 % de los ingresos?'
        textos:
          type: object
          description: Traducciones del texto de la pregunta por código de idioma
          additionalProperties:
            type: string
          example:
            es: '¿El importe del alquiler es inferior al 35 % de los ingresos?'
            en: 'Is the rent amount less than 35% of your income?'

    Seccion:
      type: object
      required: [id, numero, titulo, preguntas]
      properties:
        id:
          type: string
          example: seccion-vivienda
        numero:
          type: integer
          minimum: 1
          example: 1
        titulo:
          type: string
          example: Situación de Vivienda
        titulos:
          type: object
          description: Traducciones del título de la sección por código de idioma
          additionalProperties:
            type: string
          example:
            es: Situación de Vivienda
            en: Housing Situation
        preguntas:
          type: array
          items:
            $ref: '#/components/schemas/Pregunta'

    CatalogoPreguntas:
      type: object
      required: [secciones]
      properties:
        secciones:
          type: array
          items:
            $ref: '#/components/schemas/Seccion'

    # ------------------------------------------------------------------
    # Declaración – Input (multipart/form-data)
    #
    # Sólo los datos personales son fijos en el esquema. Las respuestas a
    # las preguntas son completamente dinámicas: cada pregunta se identifica
    # por su `campo` (camelCase) y se envía como propiedad adicional con
    # valor 'si' o 'no'. Por ejemplo:
    #     { "nombre": "...", ..., "viviendaAlquiler": "si", "ingresosJuego": "no" }
    # ------------------------------------------------------------------
    DeclaracionInput:
      type: object
      required:
        - nombre
        - apellidos
        - dniNie
        - email
        - telefono
      additionalProperties:
        oneOf:
          - $ref: '#/components/schemas/RespuestaYN'
          - type: string
            format: binary
          - type: array
            items:
              type: string
              format: binary
        description: Respuesta a la pregunta cuyo `campo` coincide con la clave, o documento adjunto.
      properties:
        # 1. Identificación
        nombre:
          type: string
          maxLength: 100
          example: María
        apellidos:
          type: string
          maxLength: 200
          example: García López
        dniNie:
          type: string
          pattern: '^[0-9XYZ][0-9]{7}[A-Z]$'
          example: 12345678A
        email:
          type: string
          format: email
          example: maria.garcia@ejemplo.es
        telefono:
          type: string
          maxLength: 20
          example: '600123456'
        # 2. Documentación
        docDniAnverso:
          type: string
          format: binary
          description: Anverso del DNI/NIE (PDF, JPG, PNG; máx. 5 MB)
        docDniReverso:
          type: string
          format: binary
          description: Reverso del DNI/NIE (PDF, JPG, PNG; máx. 5 MB)
        docAdicional:
          type: array
          items:
            type: string
            format: binary
          description: Documentación adicional (nóminas, certificados, etc.)

    # ------------------------------------------------------------------
    # Declaración – Output
    # ------------------------------------------------------------------
    DeclaracionCreada:
      type: object
      required: [id, estado, creadoEn]
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        estado:
          $ref: '#/components/schemas/EstadoExpediente'
        creadoEn:
          type: string
          format: date-time

    Documento:
      type: object
      required: [id, tipo, nombreOriginal, mimeType, tamanyo, subidoEn]
      properties:
        id:
          type: string
          format: uuid
        tipo:
          $ref: '#/components/schemas/TipoDocumento'
        nombreOriginal:
          type: string
        mimeType:
          type: string
        tamanyo:
          type: integer
          description: Tamaño en bytes
        url:
          type: string
          description: URL de acceso al documento (si se almacena externamente)
        subidoEn:
          type: string
          format: date-time

    Declaracion:
      allOf:
        - $ref: '#/components/schemas/DeclaracionCreada'
        - type: object
          required:
            - nombre
            - apellidos
            - dniNie
            - email
            - telefono
            - actualizadoEn
          additionalProperties:
            $ref: '#/components/schemas/RespuestaYN'
            description: Respuesta a la pregunta cuyo `campo` coincide con la clave.
          properties:
            nombre:
              type: string
            apellidos:
              type: string
            dniNie:
              type: string
            email:
              type: string
              format: email
            telefono:
              type: string
            actualizadoEn:
              type: string
              format: date-time
            documentos:
              type: array
              items:
                $ref: '#/components/schemas/Documento'

    ListaDeclaraciones:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Declaracion'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ------------------------------------------------------------------
    # Errores
    # ------------------------------------------------------------------
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: SERVICE_UNAVAILABLE
        message:
          type: string
          example: El servicio no está disponible en este momento

    ErrorValidacion:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errores:
              type: array
              items:
                type: object
                required: [campo, mensaje]
                properties:
                  campo:
                    type: string
                    example: dniNie
                  mensaje:
                    type: string
                    example: El formato del DNI/NIE no es válido

    # ------------------------------------------------------------------
    # Preguntas adicionales (CRUD admin)
    # ------------------------------------------------------------------
    TipoRespuesta:
      type: string
      enum: [yn, texto, numero]
      description: Tipo de respuesta esperada para la pregunta

    PreguntaAdicionalInput:
      type: object
      required: [texto, seccion, tipoRespuesta]
      properties:
        texto:
          type: string
          description: Texto de la pregunta
          example: '¿Ha declarado bienes en el extranjero (modelo 720)?'
        seccion:
          type: string
          description: Sección a la que pertenece la pregunta
          example: Ingresos Extraordinarios
        tipoRespuesta:
          $ref: '#/components/schemas/TipoRespuesta'
        activa:
          type: boolean
          default: true
        obligatoria:
          type: boolean
          default: false

    PreguntaAdicional:
      allOf:
        - $ref: '#/components/schemas/PreguntaAdicionalInput'
        - type: object
          required: [id, creadaEn, actualizadaEn]
          properties:
            id:
              type: string
              format: uuid
            creadaEn:
              type: string
              format: date-time
            actualizadaEn:
              type: string
              format: date-time

    ListaPreguntasAdicionales:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PreguntaAdicional'
        total:
          type: integer

    # ------------------------------------------------------------------
    # Asignación declaración ↔ pregunta (many-to-many)
    # ------------------------------------------------------------------
    DeclaracionPregunta:
      type: object
      required: [id, declaracionId, preguntaId, asignadaEn]
      properties:
        id:
          type: string
          format: uuid
        declaracionId:
          type: string
          format: uuid
        preguntaId:
          type: string
          format: uuid
        pregunta:
          $ref: '#/components/schemas/PreguntaAdicional'
        respuesta:
          type: string
          nullable: true
        asignadaEn:
          type: string
          format: date-time
        respondidaEn:
          type: string
          format: date-time
          nullable: true

    ListaDeclaracionPreguntas:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeclaracionPregunta'
        total:
          type: integer

    UpsertDeclaracionPreguntasInput:
      type: object
      required: [asignaciones]
      properties:
        asignaciones:
          type: array
          items:
            type: object
            required: [preguntaId]
            properties:
              preguntaId:
                type: string
                format: uuid
              respuesta:
                type: string
                nullable: true

    # ------------------------------------------------------------------
    # Secciones (CRUD admin)
    # ------------------------------------------------------------------
    SeccionInput:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          description: Nombre de la sección
          example: Ingresos Extraordinarios e Inversiones
        activa:
          type: boolean
          default: true

    SeccionAdmin:
      allOf:
        - $ref: '#/components/schemas/SeccionInput'
        - type: object
          required: [id, creadaEn, actualizadaEn]
          properties:
            id:
              type: string
              format: uuid
            creadaEn:
              type: string
              format: date-time
            actualizadaEn:
              type: string
              format: date-time

    ListaSecciones:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SeccionAdmin'
        total:
          type: integer

    # ------------------------------------------------------------------
    # Idiomas & Traducciones (CRUD admin)
    # ------------------------------------------------------------------
    IdiomaInput:
      type: object
      required: [code, label]
      properties:
        code:
          type: string
          maxLength: 10
          description: Código ISO del idioma
          example: ca
        label:
          type: string
          description: Etiqueta legible del idioma
          example: Català
        activo:
          type: boolean
          default: true

    IdiomaUpdateInput:
      type: object
      properties:
        label:
          type: string
          description: Etiqueta legible del idioma
          example: Català
        activo:
          type: boolean

    Idioma:
      allOf:
        - $ref: '#/components/schemas/IdiomaInput'
        - type: object
          required: [id, creadoEn]
          properties:
            id:
              type: string
              format: uuid
            creadoEn:
              type: string
              format: date-time
            actualizadoEn:
              type: string
              format: date-time

    ListaIdiomas:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Idioma'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    IdiomaContent:
      type: object
      required: [code, content]
      properties:
        code:
          type: string
          example: es
        content:
          type: object
          additionalProperties:
            type: string
          description: Mapa clave → valor de las traducciones del idioma
          example:
            headerTitle: Cuestionario para Expediente Fiscal
            btnSubmit: Enviar cuestionario

    IdiomaContentInput:
      type: object
      required: [content]
      properties:
        content:
          type: object
          additionalProperties:
            type: string
          description: Mapa clave → valor con las traducciones a guardar

    TraduccionesFaltantes:
      type: object
      properties:
        referencia:
          type: string
          description: Código del idioma usado como referencia
          example: es
        total_claves:
          type: integer
          description: Número total de claves en el idioma de referencia
          example: 120
        faltantes:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Mapa idioma → lista de claves que le faltan
          example:
            ca: [app.title, form.submit]
            eu: [form.submit]
        resumen:
          type: array
          items:
            type: object
            properties:
              idioma:
                type: string
                example: ca
              total_faltantes:
                type: integer
                example: 2
          description: Resumen con el número de claves faltantes por idioma
